about:
  sections:
    - id: 1
      title: "Our Story"
      description: "XYZ Café was founded in 2022 by Arpan Kar, with a vision to bring a modern yet homely café culture to Barasat. What started as a small idea — a comfortable place to sit, eat, and relax — quickly became a local favorite."
      imageUrl: "/menu_media/menu__beverage__hot__coffee__2.jpg"
      reverse: false
    - id: 2
      title: "The Ambiance"
      description: "From the aroma of freshly brewed coffee to the comfort of your favorite corner seat, we've created a space where people can relax, connect, and enjoy moments that matter. Perfect for hangouts & dates."
      imageUrl: "/menu_media/menu__food__main__farmhouse-pizza__0.jpg"
      reverse: true
    - id: 3
      title: "Our Craft"
      description: "We serve a carefully crafted menu of beverages, snacks, and meals that blend taste, quality, and affordability. Freshly brewed. Locally loved."
      imageUrl: "/menu_media/menu__beverage__cold__cold-coffee-with-ice-cream__0.jpg"
      reverse: false

